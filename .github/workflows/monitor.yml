name: Monitor de editais
on:
  schedule:
    - cron: "0 0 * * *"   # uma vez por dia (24h), às 00:00 UTC / 21:00 Brasília
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python coletar.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dados/noticias.csv
          git commit -m "atualiza noticias $(date -u +%Y-%m-%d-%H%M)" || echo "nada novo"
          git push
